<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John Regis | CV</title>
<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/johnregis30-eng/johnregis30-eng.github.io/main/Red_Fox_5.jpg">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* FADE-IN ANIMATION */
.card{
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}
.card.show{
  opacity: 1;
  transform: translateY(0);
}

/* GENERAL STYLES */
body{
    margin:0;
    font-family:"Inter",sans-serif;
    background:#f4e9dc;
    color:#2b2b2b;
    line-height:1.7;
}
html { scroll-behavior: smooth; }

/* HEADER */
header{
    background:linear-gradient(135deg,#2b1b16,#4a2416);
    color:white;
    padding:3rem 2rem;
    text-align:center;
}
header h1{
    font-family:"Libre Baskerville",serif;
    font-size:40px;
    letter-spacing:2px;
    margin-bottom:5px;
}
header p{ opacity:.9; margin:0; }
.hero-quote{ margin-top:10px; font-style:italic; color:#f3c7a5; }

/* NAVIGATION */
nav{
    display:flex;
    justify-content:center;
    gap:2rem;
    padding:1rem;
    background:#fff0e5;
    border-bottom:2px solid #d04a1c;
}
nav a{
    color:#a63b16;
    text-decoration:none;
    font-weight:500;
    letter-spacing:1px;
    padding-bottom:4px;
    position:relative;
}
nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:0;
    height:2px;
    background:#ff8a3c;
    transition:width 0.3s ease;
}
nav a:hover::after{ width:100%; }
nav a:hover{ color:#ff8a3c; }

/* CONTAINER */
.container{
    max-width:900px;
    margin:2rem auto;
    padding:1rem 2rem;
}

/* SECTIONS */
.card{
    padding:1.5rem 1rem;
    margin-bottom:2rem;
    border-bottom:1px solid #d9c5b3;
}
.card h2{
    font-family:"Libre Baskerville",serif;
    color:#a63b16;
    margin-bottom:0.8rem;
}
.card ul{ padding-left:20px; }
.card li{ margin-bottom:8px; }

/* LINK COLORS */
a{
    color:#ff8a3c;
    text-decoration:none;
    font-weight:500;
}
a:hover{ color:#d04a1c; }

/* FOOTER */
footer{
    text-align:center;
    padding:2rem;
    margin-top:2rem;
    font-size:14px;
    color:#6f4b3a;
}

/* CV LIST */
.cv-list { list-style: none; padding-left: 0; }
.cv-item { display: flex; justify-content: space-between; margin-bottom: 1.5rem; }
.cv-left { max-width: 75%; }
.cv-right { text-align: right; font-weight: 500; color: #a63b16; }
</style>
</head>
<body>

<header>
<h1>John Regis</h1>
<p>M.Sc. in Quantum Technology, IISER Pune</p>
<p class="hero-quote">Exploring physics, materials, and the systems that shape our technological future.</p>

<nav>
<a href="#education">Education</a>
<a href="#research">Research Experience</a>
<a href="#quantum-lab">Quantum Lab Experience</a>
<a href="#skills">Skills</a>

<footer>
© 2026 John
</footer>

<!-- Intersection Observer Script for fade-in -->
<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".card").forEach(section => {
  observer.observe(section);
});
</script>

<!-- Force Back Button to Portfolio -->
<script>
history.pushState(null, null, location.href);
window.onpopstate = function() {
    window.location.href = "index.html";
};
</script>

</body>
</html>
